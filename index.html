    <style>
        /* VARIABLES MODERNAS */
        :root {
            --green-brand: #007A33;
            --green-dark: #004c20;
            --green-dim: #002b12;
            --green-neon: #00df5d;
            --gold: #d4af37;
            --gold-dark: #aa8620;
            --red: #ff4757;
            --red-neon: #ff6b81;
            --text-main: #0f172a;
            --text-muted: #475569;
            --bg-base: #f8fafc;
            /* Pasaporte Realista */
            --passport-cover: #0d2b1d; /* Verde muy oscuro casi azulado marino */
            --passport-paper: #f4f0ec; /* Papel ahuesado */
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(0, 122, 51, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main); background: var(--bg-base);
            height: 100vh; width: 100vw; overflow: hidden;
            position: relative;
        }
        h1, h2, h3, .font-heading { font-family: 'Outfit', sans-serif; font-weight: 700; letter-spacing: -0.02em; }

        .text-green { color: var(--green-brand) !important; }
        .text-gold { color: var(--gold) !important; }
        .text-sm { font-size: 0.85rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mt-4 { margin-top: 1rem; }
        .flex { display: flex; }
        .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .center-text { text-align: center; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: var(--glass-shadow);
        }

        #app { height: 100vh; overflow-y: auto; overflow-x: hidden; max-width: 600px; margin: 0 auto; scroll-behavior: smooth; }
        .main-padding { padding: calc(85px + env(safe-area-inset-top, 0)) 20px calc(110px + env(safe-area-inset-bottom, 0)); }

        /* CABECERA TOP */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: calc(75px + env(safe-area-inset-top, 0));
            padding: env(safe-area-inset-top, 0) 20px 0;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
        }
        .header.hidden { transform: translateY(-100%); }
        .logo-box { display: flex; align-items: center; gap: 8px; font-family: 'Outfit'; font-size: 1.3rem; font-weight: 800; color:var(--green-brand); }
        .level-pill { background: var(--green-brand); color: white; display: flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }

        /* BARRA INFERIOR DE NAVEGACIÓN */
        .bottom-nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 100;
            width: calc(100% - 30px); max-width: 500px;
            height: 70px; display: flex; justify-content: space-around; align-items: center;
            background: rgba(20, 30, 24, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .bottom-nav.hidden { transform: translate(-50%, 150%); }
        .nav-btn { background: none; border: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .nav-btn .icon { font-size: 26px; transition: 0.3s; }
        .nav-btn .label { font-size: 0.65rem; font-weight: 600; font-family: 'Outfit'; opacity: 0; transform: translateY(10px); height: 0; }
        .nav-btn.active { color: var(--green-neon); }
        .nav-btn.active .icon { transform: translateY(-4px); font-variation-settings: 'FILL' 1; }
        .nav-btn.active .label { opacity: 1; transform: translateY(0); height: auto; }
        .nav-spacer { width: 60px; }

        /* BOTÓN FLOTANTE CAZADORES (SOS/CÁMARA) */
        .fab-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 110; transition: 0.3s; }
        .fab-container.hidden { transform: translate(-50%, 200px); }
        .fab {
            width: 70px; height: 70px; border-radius: 35px; border: none;
            background: linear-gradient(135deg, var(--red-neon), var(--red));
            color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4); border: 4px solid #fff;
            cursor: pointer; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:hover { transform: scale(1.05); }
        .fab:active { transform: scale(0.9); }
        .fab .icon { font-size: 34px; }

        /* ================== PANTALLAS ESPECÍFICAS ================== */
        
        /* 1. PORTADA PASAPORTE (Hiperrealista) */
        .passport-cover {
            background-color: var(--passport-cover);
            /* Textura de cuero generada con SVG noise y multiples texturas radiales */
            background-image: 
                radial-gradient(ellipse at 50% 10%, rgba(255,255,255,0.08) 0%, transparent 60%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.08"/></svg>');
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--gold); 
            border: 1px solid rgba(0,0,0,0.8);
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), inset 5px 0 10px rgba(255,255,255,0.1);
            position: relative; z-index: 200; cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: left center;
        }
        /* Bordado cosido lateral */
        .passport-cover::before {
            content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 4px;
            background: repeating-linear-gradient(0deg, transparent, transparent 5px, rgba(0,0,0,0.4) 5px, rgba(0,0,0,0.4) 15px);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .passport-cover.open { transform: rotateY(-180deg) perspective(1500px); }
        
        .gold-foil {
            color: transparent;
            background: linear-gradient(135deg, #d4af37 0%, #fffcb0 30%, #d4af37 60%, #8a6d1c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0px 1px 0px rgba(255,255,255,0.3)) drop-shadow(0px -1px 1px rgba(0,0,0,0.8));
            text-align: center;
        }

        /* Logo Oficial de Garoña para Portada */
        .garona-logo-img {
            width: 180px; height: auto; margin: 30px 0;
            object-fit: contain;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));
        }

        /* 2. REGISTRO */
        .page-bg { background: var(--passport-paper); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items:center; background-image: repeating-linear-gradient(45deg, rgba(0,122,51,0.02) 0px, rgba(0,122,51,0.02) 2px, transparent 2px, transparent 10px);}
        .input-field { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(0,0,0,0.1); font-size: 1rem; margin-bottom: 12px; font-family: 'Inter'; background: white; outline:none; transition:0.3s;}
        .input-field:focus { border-color: var(--green-brand); }
        .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s; background: var(--green-brand); color: white; box-shadow: 0 8px 16px rgba(0, 122, 51, 0.2); }
        .btn-action:active { transform: scale(0.96); box-shadow: 0 4px 8px rgba(0, 122, 51, 0.2); }
        .avatar-upload { width: 120px; height: 120px; border-radius: 60px; background: rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; border: 3px dashed rgba(0,0,0,0.2); margin: 0 auto 20px; cursor: pointer; overflow:hidden; position:relative;}
        .avatar-upload img { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; pointer-events:none;}

        /* 3. HOME (INTERIOR PASAPORTE) */
        .id-card { background: white; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); padding: 20px; display: flex; gap: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .id-card::before { content: ''; position: absolute; top:0; right:0; width: 60px; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,122,51,0.05) 0, rgba(0,122,51,0.05) 1px, transparent 1px, transparent 10px); }
        .id-photo { width: 100px; height: 130px; border-radius: 8px; background: #eee; object-fit: cover; border: 2px solid var(--green-brand); }
        .id-data { flex: 1; display:flex; flex-direction:column; justify-content:center; }
        .id-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .id-val { font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem; color: var(--text-main); margin-bottom: 8px; }
        
        .progress-track { background: rgba(0,0,0,0.05); height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-fill { background: linear-gradient(90deg, var(--green-brand), var(--green-neon)); height: 100%; border-radius: 6px; transition: width 1.2s; }

        /* 4. ROADMAP (CAMINO DEL PROFESIONAL) */
        .roadmap-container { padding: 20px 0; position:relative; }
        .roadmap-line { position: absolute; left: 40px; top: 30px; bottom: 30px; width: 4px; background: rgba(0,0,0,0.1); z-index: 1;}
        .roadmap-fill { position: absolute; left: 40px; top: 30px; width: 4px; background: var(--green-brand); z-index: 2; transition: 1s;}
        .node { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; position: relative; z-index: 3; }
        .node-icon { width: 44px; height: 44px; border-radius: 22px; background: white; border: 3px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text-muted); transition: 0.3s;}
        .node.active .node-icon { border-color: var(--green-brand); color: white; background: var(--green-brand); box-shadow: 0 0 15px rgba(0,122,51,0.4);}
        .node.future .node-icon { opacity: 0.5; }

        /* 5. SELLOS Y QR */
        .stamp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top:20px; }
        .stamp-box { aspect-ratio: 1; border: 2px dashed rgba(0,0,0,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative;}
        .stamp-img { width: 80%; height: 80%; object-fit: contain; animation: stampPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: rotate(deg); }
        @keyframes stampPop { 0% { transform: scale(3) rotate(-20deg); opacity:0; } 100% { transform: scale(1) rotate(v-bind(rot)); opacity:0.8; } }
        
        .mock-scanner { position: fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.9); z-index: 3000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .scanner-frame { width: 250px; height: 250px; border: 4px solid var(--green-neon); position: relative; margin-bottom:20px;}
        .scanner-line { width: 100%; height: 2px; background: var(--green-neon); position: absolute; top:0; animation: scanAnim 2s infinite linear; box-shadow: 0 0 10px var(--green-neon); }
        @keyframes scanAnim { 0% { top:0; } 50% { top: 100%; } 100% { top: 0; } }

        /* 6. POPUP CULTURA (PUSH / DIARIO) */
        .modal-overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index: 4000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px); }
        .modal-box { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        .likert { display: flex; justify-content: space-between; margin: 20px 0; }
        .likert-btn { width: 45px; height: 45px; border-radius: 22.5px; border: 2px solid rgba(0,0,0,0.1); background: white; font-family:'Outfit'; font-weight:700; font-size:1.1rem; cursor:pointer; transition:0.2s; }
        .likert-btn:active { transform: scale(0.9); }
        .likert-btn.selected { background: var(--green-brand); color: white; border-color: var(--green-brand); }

        /* 7. KUDOS AUTOCOMPLETE & TABS */
        .kudos-tabs { display:flex; background:rgba(0,0,0,0.05); border-radius:12px; padding:5px; margin-bottom:20px; }
        .k-tab { flex:1; text-align:center; padding:10px; font-family:'Outfit'; font-weight:700; font-size:0.85rem; border-radius:8px; cursor:pointer; color:var(--text-muted); transition:0.3s; border:none; background:transparent;}
        .k-tab.active { background:white; color:var(--green-brand); box-shadow:0 4px 10px rgba(0,0,0,0.05); }
        .k-feed-card { display:flex; gap:15px; padding:15px; border-bottom:1px solid rgba(0,0,0,0.05); text-align: left; }
        .k-feed-card:last-child { border-bottom:none; }
        .k-feed-avatar { width:40px; height:40px; border-radius:20px; object-fit:cover; }
        
        .autocomplete-list { background:white; border-radius:12px; box-shadow:0 10px 20px rgba(0,0,0,0.1); margin-top:5px; max-height:150px; overflow-y:auto; border: 1px solid rgba(0,0,0,0.05);}
        .ac-item { padding: 12px 15px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition:0.2s;}
        .ac-item:active { background: rgba(0,122,51,0.1); }
        select.input-field { appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position-x: 95%; background-position-y: center; }

        /* 8. TERMÓMETRO SLIDERS/EMOJIS */
        .fho-question { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .emoji-flex { display: flex; justify-content: space-between; margin-top:10px;}
        .emoji-item { font-size: 2.2rem; filter: grayscale(1); opacity: 0.4; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .emoji-item.active { filter: grayscale(0); opacity: 1; transform: scale(1.3); }

        /* 9. EC TOOL (Tarjetas Ficha Realismo) */
        .ec-frame {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 0 4px var(--green-brand);
            position: relative;
            text-align: left;
            margin-bottom: 20px;
        }
        .ec-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--green-brand); padding-bottom: 10px; margin-bottom: 15px; }
        .ec-title { font-family: 'Outfit'; font-weight: 800; font-size: 0.9rem; color: var(--green-brand); text-transform: uppercase; letter-spacing: 1px; }
        .ec-badge { background: var(--green-brand); color: white; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; letter-spacing: 1px;}
        .ec-photo { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); margin-bottom: 15px; }
        .ec-kw { background: #f1f5f9; display: inline-block; padding: 5px 12px; border-radius: 6px; font-family: 'Outfit'; font-weight: 800; color: #334155; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        
        .quiz-option { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: rgba(0,0,0,0.03); border: 2px solid transparent; text-align: left; font-family: 'Inter'; font-weight: 500; cursor: pointer; transition: 0.2s;}
        .quiz-option.correct { background: var(--green-brand); color: white; border-color: var(--green-brand); }
        .quiz-option.wrong { background: var(--red); color: white; border-color: var(--red); }

        /* 10. CAZADORES FORM */
        textarea.input-field { resize: none; min-height: 120px; }

        /* UTILIDADES GLOBALES */
        #toasts { position: fixed; top: calc(85px + env(safe-area-inset-top, 0)); left: 20px; right: 20px; z-index: 5000; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        .toast-msg { background: #1e293b; color: #fff; padding: 14px 20px; border-radius: 30px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; max-width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { opacity: 0; transform: translateY(-20px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>

        <div class="nav-spacer"></div>

            <span class="material-symbols-rounded icon">emergency</span>

    <script>
        /* ================= 1. MOCK DATABASE (LocalStorage) ================= */
        const IS12_RAW = `AMBULANCIAS RODRIGO: Sandra Pinto Tortajada
APPLUS: Pablo Amaro Aragunde, Jose Andres Bacelo Rizaldos, Unai Mayor Sánchez, José Rodríguez Prieto
ARS FACTUM: Fco Javier Miguel Diez, Roberto Rubio Bartolome

                        db.currentUserId = parsed.currentUserId || null;

                        if(db.currentUserId && parsed.users) {
                            const act = parsed.users.find(u => u.id === db.currentUserId);

                        }

            const icon = isAlert ? 'notifications_active' : 'check_circle';
            const col = isAlert ? 'var(--gold)' : 'var(--green-neon)';
            d.innerHTML = `<span class="material-symbols-rounded" style="color:${col}">${icon}</span> <span>${msg}</span>`;
            document.getElementById('toasts').appendChild(d);
            try { if(navigator.vibrate) navigator.vibrate(isAlert ? [50, 50, 50] : 30); } catch(e){}
            setTimeout(() => { 
                d.style.opacity = '0'; d.style.transform = 'translateY(-20px)'; d.style.transition = '0.3s';
                setTimeout(() => d.remove(), 300); 
            }, 4000);
        }

            let currentLevel = 1;
            for(let i=0; i<LEVELS_REQ.length; i++) {
                if(u.pts >= LEVELS_REQ[i]) currentLevel = i + 1;

                notify(`✨ ¡SUBIDA DE NIVEL! Eres Nivel ${currentLevel}`);
            } else {

        window.setKuUser = function(id, name) {
            document.getElementById('kuSearch').value = name;
            document.getElementById('kuTargetId').value = id;
            document.getElementById('acList').style.display = 'none';
        }
        window.closeAc = function(e) {
            if(e && e.target && e.target.id === 'kuSearch') return;
            const l = document.getElementById('acList');
            if(l) l.style.display = 'none';
        }
        window.doSendKudo = async function() {
            const v = document.getElementById('kuSearch').value;
            const targetId = document.getElementById('kuTargetId').value;
            const r = document.getElementById('kuReason').value;
            const m = document.getElementById('kuMsg').value || "Mantenemos los altos estándares por el buen camino.";
            if(!v || !targetId || !r) { notify("Selecciona un usuario de la lista y una expectativa"); return; }
            
            const btn = document.getElementById('btnKuSend');
            btn.innerHTML = `<span class="material-symbols-rounded">sync</span> GUARDANDO...`;
            btn.style.opacity = '0.6';

            await api.sendKudo(targetId, r, m);
            
            addPoints(20, "Kudos P2P Enviado");
            document.getElementById('kuTargetId').value = '';
            document.getElementById('kuSearch').value = '';
            go('home');
        };

        // --- Termómetro ---
        let fatVals = { fis: 2, men: 2, int: 2, pre: 2, apo: 2 };
        window.selFho = function(id, val, el) {
            fatVals[id] = val;
            const parent = el.parentElement;
            parent.querySelectorAll('.emoji-item').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
        };
        
        window.doSubmitFatigue = async function() {
            const u = getActiveUser();
            if(!u) return;

            const btn = document.getElementById('btnFat');
            btn.innerHTML = `<span class="material-symbols-rounded">sync</span> GUARDANDO...`;
            btn.style.opacity = '0.6';
            
            await api.submitDailyCheck(u.id, 'fatigue_thermometer', fatVals);
            addPoints(10, 'Termómetro FHO enviado a nube');
            go('home');
        };

        // --- E+C Tool ---
        window.evalEc = function(isCorrect, btn) {
            const card = document.getElementById('ecCard');
            const btns = card.querySelectorAll('.quiz-option');
            btns.forEach(b => b.onclick = null); // disable
            
            if(isCorrect) {
                btn.classList.add('correct');
                addPoints(15, "Reflexión E+C correcta");
                try { if(navigator.vibrate) navigator.vibrate(30); } catch(e){}
            } else {
                btn.classList.add('wrong');
                btns[1].classList.add('correct'); // La B era correcta
                try { if(navigator.vibrate) navigator.vibrate([20,50,20]); } catch(e){}
            }
            setTimeout(()=>go('home'), 2000);
        };

        /* ================= 6. BOOT ================= */
        document.addEventListener('DOMContentLoaded', () => {
            initDB();
            const u = getActiveUser();
            const uLvEl = document.getElementById('uLv');
            if(uLvEl) uLvEl.innerText = u ? u.level : 1;
            go('cover');
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
